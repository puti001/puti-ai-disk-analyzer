<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puti-AI 磁碟空間分析工具</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header>
      <div class="header-row">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
            <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
            <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
          </svg>
          <h1>Puti-AI 磁碟分析工具</h1>
        </div>
        <div class="header-actions">
          <button type="button" id="btn-shutdown" class="btn btn-ghost" title="關閉工具">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
              <line x1="12" y1="2" x2="12" y2="12"></line>
            </svg>
            <span>關閉工具</span>
          </button>
        </div>
      </div>
      <p class="subtitle">選擇資料夾，深入分析檔案類型分佈與空間佔用</p>
    </header>

    <main>
      <!-- 輸入區 -->
      <section class="card input-section">
        <div class="input-row">
          <input type="text" id="folder-path" placeholder="輸入或選擇資料夾路徑，例如：C:\Users\Username\Documents" autocomplete="off" spellcheck="false">
          <button type="button" id="btn-browse" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            <span>瀏覽</span>
          </button>
          <button type="button" id="btn-scan" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" class="btn-icon">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <span class="btn-text">開始分析</span>
          </button>
          <button type="button" id="btn-cancel" class="btn btn-danger hide">取消</button>
        </div>
        <div class="quick-drives" id="quick-drives">
          <span class="label">快速選擇：</span>
          <!-- JS 動態填入磁碟機按鈕 -->
        </div>
      </section>

      <!-- 進度區 -->
      <section id="progress-card" class="card progress-section hide">
        <div class="progress-header">
          <div class="status-badge pulse">
            <span class="pulse-dot"></span>
            掃描中
          </div>
          <div class="progress-stats">
            <span>檔案 <strong id="stat-files">0</strong></span>
            <span class="divider">|</span>
            <span>資料夾 <strong id="stat-folders">0</strong></span>
            <span class="divider">|</span>
            <span>已掃描 <strong id="stat-size">0 B</strong></span>
          </div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <div class="current-path" id="current-path">準備中...</div>
      </section>

      <!-- 錯誤提示 -->
      <section id="error-card" class="card error-section hide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span id="error-text">發生錯誤</span>
      </section>

      <!-- 導覽列 -->
      <div id="nav-bar" class="card nav-bar hide">
        <button type="button" id="btn-nav-parent" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          上一層
        </button>
        <div class="nav-path" id="nav-current-path">—</div>
        <button type="button" id="btn-rescan" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          重新分析
        </button>
      </div>

      <!-- 分析結果 -->
      <div id="results-area" class="results-layout hide">
        <!-- 左側：圓餅圖 -->
        <div class="results-left">
          <div class="card chart-card">
            <h3>檔案類型分佈</h3>
            <div class="chart-container">
              <canvas id="pie-chart"></canvas>
              <div class="chart-center" id="chart-center">
                <div class="chart-total-label">總大小</div>
                <div class="chart-total-value" id="chart-total">—</div>
              </div>
            </div>
            <div class="legend-list" id="legend-list">
              <!-- JS 動態填入 -->
            </div>
          </div>
        </div>

        <!-- 右側：十大巨無霸檔案 -->
        <div class="results-right">
          <div class="card files-card">
            <div class="files-header">
              <h3>🏆 十大巨無霸檔案</h3>
              <div class="files-toolbar">
                <label class="checkbox-label" id="select-all-label">
                  <input type="checkbox" id="select-all-cb">
                  <span class="checkmark"></span>
                  全選
                </label>
                <button type="button" id="btn-delete-selected" class="btn btn-danger btn-sm" disabled>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                  刪除選取
                </button>
              </div>
            </div>
            <div class="files-list" id="files-list">
              <!-- JS 動態填入 -->
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <p>屏東縣後庄國小黃朝榮老師作品 | 免費分享，歡迎推廣</p>
      <p style="margin-top:4px">更多 Puti-AI 教學工具 👉 <a href="https://padlet.com/clongwh/puti_ai_tools" target="_blank" style="color:var(--accent-start);text-decoration:underline;font-weight:600">Puti-AI 教學工具庫</a></p>
    </footer>
  </div>

  <!-- 目錄瀏覽 Modal -->
  <div id="browse-modal" class="modal-overlay hide">
    <div class="modal-content">
      <div class="modal-header">
        <h3>選擇資料夾</h3>
        <button type="button" id="btn-modal-close" class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="drive-row" id="modal-drive-row">
          <label>磁碟機：</label>
          <select id="modal-drive-select" class="drive-select">
            <!-- JS 動態填入 -->
          </select>
        </div>
        <div class="breadcrumbs" id="modal-breadcrumbs">
          <!-- JS 動態渲染 -->
        </div>
        <div class="dirs-container">
          <ul id="modal-dirs-list" class="dirs-list">
            <!-- JS 動態渲染 -->
          </ul>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" id="btn-modal-select" class="btn btn-primary">選擇此資料夾</button>
        <button type="button" id="btn-modal-cancel" class="btn btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <!-- 確認刪除 Modal -->
  <div id="confirm-modal" class="modal-overlay hide">
    <div class="modal-content confirm-content">
      <div class="modal-header">
        <h3>⚠️ 確認刪除</h3>
        <button type="button" id="btn-confirm-close" class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <p class="confirm-warning">以下檔案將被永久刪除，此操作無法復原：</p>
        <ul class="confirm-file-list" id="confirm-file-list">
          <!-- JS 動態填入 -->
        </ul>
      </div>
      <div class="modal-footer">
        <button type="button" id="btn-confirm-delete" class="btn btn-danger">確認刪除</button>
        <button type="button" id="btn-confirm-cancel" class="btn btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
